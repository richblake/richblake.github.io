---
layout: default
---

<section class="single{% if page.class %} {{ page.class }}{% endif %}">

	<div class="wrap">

		<h1>{{ page.title }}</h1>
		{% if page.subtitle %}
		<p class="subtitle">{{ page.subtitle }}</p>
		{% elsif page.date %}
		<p class="subtitle">{{ page.date | date_to_long_string }}</p>
		{% endif %}

		{{ content }}

	</div>

</section>
